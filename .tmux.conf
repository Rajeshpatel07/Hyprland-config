#set leader
set -g prefix C-a
#spliting panel
bind / split-window -h
bind - split-window -v

# Break the current pane
bind b break-pane -dP

#switching panels
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


#Mouse support
set -g mouse on
set -g status-position top
set -g base-index 1

# image rendering purpose
set -gq allow-passthrough on
set -g visual-activity off

#reload the config
bind r source-file ~/.tmux.conf

bind m if -F '#{@layout_save}' \
    {run 'tmux select-layout "#{@layout_save}" ; set -u @layout_save'} \
    {set -Fp @layout_save "#{window_layout}" ; run 'tmux resize-pane -Z'}# List of plugins


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
