# Max gamma limit (optional, for brighter adjustments)
max-gamma = 150

# Daytime profile: Neutral (full daylight)
profile {
    time = 06:00  # Sunrise
    identity = true  # No color shift, just brightness if needed
    gamma = 1.0
}

# Evening/Night profile: Blue light filter (warmer tones)
profile {
    time = 18:00  # ~1 hour after sunset for gradual transition
    temperature = 3000  # Warmer (lower = more orange; 3500K is comfortable for night)
    gamma = 0.9  # Slight dim for eye comfort (0.8-1.0 range)
}
